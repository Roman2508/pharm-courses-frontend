<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <title>БПР - Житомирський базовий фармацевтичний фаховий коледж</title>
  </head>
  <body>
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        if (navigator.onLine) {
          // Якщо інтернет є, але сталася помилка завантаження/виконання — це проблема сервера/коду
          window.location.href = "/500"
        } else {
          // Якщо інтернету немає, PWA сам підхопить офлайн сторінку або ми можемо редіректнути
          window.location.href = "/offline"
        }
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
